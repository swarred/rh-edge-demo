# ── ACM Demo Fleet — ManagedCluster stubs ────────────────────────────
# Apply after ACM MultiClusterHub is Running:
#   oc apply -f managed-clusters.yaml
#
# local-cluster (OCP hub) is created automatically by ACM.
# These stubs represent the mission edge fleet for Scenario 4.
# They show as Offline/Unknown in the fleet view — visually correct
# for a demo showing space/edge nodes that are intermittently connected.

---
# Satellite edge node — PWSA-07 LEO orbital
apiVersion: cluster.open-cluster-management.io/v1
kind: ManagedCluster
metadata:
  name: sat-edge-01
  labels:
    cluster.open-cluster-management.io/clusterset: mission-edge
    vendor: MicroShift
    cloud: Other
    domain: orbital
    location: LEO
    mission: golden-dome-sensing
    platform: RHEL-Image-Mode
  annotations:
    open-cluster-management/created-via: demo
    description: "PWSA-07 LEO orbital edge node — phi-4-mini onboard"
spec:
  hubAcceptsClient: true
  leaseDurationSeconds: 60

