apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: jtac-ops
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: localhost/dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8888
          env:
            - name: IDENTITY_SERVICE_URL
              value: "http://identity-service.jtac-ops.svc.cluster.local:5000"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: jtac-ops
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 8888
      targetPort: 8888
      nodePort: 30888
